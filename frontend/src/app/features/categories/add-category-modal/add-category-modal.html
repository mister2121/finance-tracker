<!-- OVERLAY -->
<div
  class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm lg:flex lg:items-center lg:justify-center lg:p-6"
  (pointerdown)="modalService.closeCategoryModal()"
>
  <!-- KARTA MODALA -->
  <div
    class="flex flex-col h-full w-full overflow-hidden bg-surface-card lg:h-auto lg:max-h-[90vh] lg:w-[560px] lg:rounded-2xl lg:border lg:border-zinc-700 lg:shadow-2xl"
    (pointerdown)="$event.stopPropagation()"
  >
    <!-- NAGŁÓWEK -->
    <div class="flex items-center gap-4 border-b border-zinc-800 px-4 py-4 lg:px-6">
      <button
        type="button"
        (click)="modalService.closeCategoryModal()"
        class="w-11 h-11 shrink-0 rounded-xl border border-zinc-700 bg-surface-elevated text-xl text-zinc-400 transition-colors hover:border-zinc-600 hover:text-white"
      >
        X
      </button>

      <div>
        <p class="text-xl font-bold text-white lg:text-2xl">
          {{ categoryToEdit ? 'Edytuj kategorię' : 'Dodaj kategorię' }}
        </p>

        <p class="mt-1 text-sm text-zinc-400">
          {{ categoryToEdit ? 'Zmień dane wybranej kategorii' : 'Uzupełnij dane nowej kategorii' }}
        </p>
      </div>
    </div>

    <!-- FORM  -->
    <form (ngSubmit)="onSubmit()" class="flex flex-1 flex-col min-h-0">
      <div class="flex-1 overflow-y-auto px-4 pb-8 pt-2 lg:px-6">
        <label class="mt-4 text-sm font-medium text-zinc-200 block">Nazwa</label>
        <input
          type="text"
          name="name"
          [(ngModel)]="name"
          class="mt-2 w-full rounded-xl border border-zinc-700 bg-surface-elevated px-4 py-3 text-white placeholder:text-zinc-500 outline-none transition-colors hover:border-zinc-600 focus:border-brand-purple focus:ring-1 focus:ring-brand-purple"
        />
        <p class="mt-1 text-xs text-zinc-500">Krótka nazwa kategorii</p>
        <label class="mt-4 text-sm font-medium text-zinc-200 block">Typ</label>
        <select
          name="selectedType"
          [(ngModel)]="selectedType"
          class="mt-2 w-full rounded-xl border border-zinc-700 bg-surface-elevated px-4 py-3 text-white outline-none transition-colors hover:border-zinc-600 focus:border-brand-purple focus:ring-1 focus:ring-brand-purple"
        >
          <option [ngValue]="null" disabled>Wybierz typ konta</option>
          <option [ngValue]="CategoryType.EXPENSE">Wydatki</option>
          <option [ngValue]="CategoryType.INCOME">Przychody</option>
        </select>
        <p class="mt-1 text-xs text-zinc-500">Wybierz odpowiedni typ kategorii</p>
      </div>
      <div
        class="grid shrink-0 grid-cols-2 gap-3 border-t border-zinc-800 bg-surface-card p-4 lg:px-6"
      >
        <button
          type="button"
          (click)="modalService.closeCategoryModal()"
          class="rounded-xl border border-zinc-700 bg-surface-elevated py-3 font-medium text-zinc-300 transition-colors hover:border-zinc-600 hover:text-white active:bg-zinc-800"
        >
          Anuluj
        </button>
        <button
          type="submit"
          class="rounded-xl bg-brand-purple py-3 font-medium text-white transition-colors hover:bg-violet-700 active:bg-violet-800"
        >
          {{ categoryToEdit ? 'Zapisz zmiany' : 'Dodaj konto' }}
        </button>
      </div>
    </form>
  </div>
</div>
