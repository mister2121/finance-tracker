<!-- MOBILE TOP BAR -->
<nav
  class="flex justify-between items-center px-4 py-3 fixed top-0 left-0 right-0 bg-surface-card/40 backdrop-blur-xl shadow-lg border-b border-brand-border/40 lg:hidden z-40"
>
  <!-- LEWO: logo -->
  <div class="text-zinc-200 font-bold">Finance Tracker</div>

  <!-- PRAWO: miesiąc + avatar -->
  <div class="flex items-center gap-3">
    <span class="text-sm text-zinc-400">{{ currentMonth }}</span>
    <!-- Separator -->
    <div class="h-10 w-px bg-zinc-700"></div>
    <div class="relative">
      <!-- AVATAR -->
      <div
        class="flex items-center gap-2 cursor-pointer rounded-2xl hover:bg-surface-elevated"
        (click)="toggleUserMenu()"
      >
        <div
          class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-purple to-violet-600 flex items-center justify-center text-white font-bold"
        >
          {{ userInitials }}
        </div>
        <div class="flex flex-col leading-none">
          <div class="flex justify-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-5 text-zinc-400"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
            </svg>
          </div>

          <span class="text-[12px] text-zinc-500">Profil</span>
        </div>
      </div>

      <!-- DROPDOWN -->
      @if (isUserMenuOpen) {
        <div
          class="absolute right-0 mt-3 w-52 rounded-2xl border border-zinc-700 bg-surface-card p-2 shadow-2xl z-50"
        >
          <a
            routerLink="/profile"
            routerLinkActive="bg-brand-purple/15 text-brand-purple"
            class="flex w-full items-center rounded-xl px-4 py-3 text-sm text-zinc-300 transition hover:bg-surface-elevated hover:text-white"
          >
            Profil
          </a>

          <a
            routerLink="/categories"
            routerLinkActive="bg-brand-purple/15 text-brand-purple"
            class="flex w-full items-center rounded-xl px-4 py-3 text-sm text-zinc-300 transition hover:bg-surface-elevated hover:text-white"
          >
            Kategorie
          </a>
          <a
            routerLink="/accounts"
            routerLinkActive="text-brand-purple"
            class="flex w-full items-center rounded-xl px-4 py-3 text-sm text-zinc-300 transition hover:bg-surface-elevated hover:text-white"
          >
            Konta
          </a>

          <div class="my-2 border-t border-zinc-700"></div>

          <button
            type="button"
            (click)="onLogout()"
            class="flex w-full items-center rounded-xl px-4 py-3 text-sm text-money-red transition hover:bg-money-red/10"
          >
            Wyloguj
          </button>
        </div>
      }
    </div>
  </div>
</nav>
