<!-- MOBILE TOP BAR -->
<nav
  class="flex justify-between items-center px-4 py-3 fixed top-0 left-0 right-0 bg-surface-card lg:hidden z-40"
>
  <!-- LEWO: logo -->
  <div class="text-zinc-200 font-bold">Finance Tracker</div>

  <!-- PRAWO: miesiąc + avatar -->
  <div class="flex items-center gap-3">
    <span class="text-sm text-zinc-400">{{ currentMonth }}</span>

    <div class="relative">
      <!-- AVATAR -->
      <button
        type="button"
        (click)="toggleUserMenu()"
        class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-purple to-violet-600 flex items-center justify-center text-white font-bold"
      >
        {{ userInitials }}
      </button>

      <!-- DROPDOWN -->
      @if (isUserMenuOpen) {
        <div
          class="absolute right-0 mt-3 w-48 rounded-2xl border border-zinc-700 bg-surface-card p-2 shadow-xl z-50"
        >
          <button
            type="button"
            class="w-full text-left px-4 py-2 rounded-xl text-sm text-zinc-300 hover:bg-surface-elevated hover:text-white"
          >
            Profil
          </button>

          <button
            type="button"
            class="w-full text-left px-4 py-2 rounded-xl text-sm text-zinc-300 hover:bg-surface-elevated hover:text-white"
          >
            Ustawienia
          </button>

          <div class="my-2 border-t border-zinc-700"></div>

          <button
            type="button"
            (click)="onLogout()"
            class="w-full text-left px-4 py-2 rounded-xl text-sm text-money-red hover:bg-surface-elevated"
          >
            Wyloguj
          </button>
        </div>
      }
    </div>
  </div>
</nav>

<!-- mobile bottom bar -->
<nav
  class="flex justify-around fixed bottom-0 left-0 right-0 bg-surface-card text-zinc-400 lg:hidden"
>
  <a routerLink="/dashboard" routerLinkActive="text-brand-purple" class="py-4">Dashboard</a>
  <a routerLink="/transactions" routerLinkActive="text-brand-purple" class="py-4">Transakcje</a>
  <a routerLink="/a" routerLinkActive="text-brand-purple" class="py-4">Analiza</a>
  <a routerLink="/b" routerLinkActive="text-brand-purple" class="py-4">Majątek</a>
  <a routerLink="/c" routerLinkActive="text-brand-purple" class="py-4">Ustawienia</a>
</nav>

<!-- DESKTOP -->
<nav
  class="hidden lg:flex lg:justify-between lg:items-center lg:px-6 lg:fixed lg:top-0 lg:left-0 lg:right-0 lg:bg-surface-card lg:text-zinc-400"
>
  <!-- LOGO LEWO  -->
  <div class="text-zinc-200 font-bold">Finance Tracker</div>
  <!-- SRODEK LINKI  -->
  <div class="flex gap-6">
    <a routerLink="/dashboard" routerLinkActive="text-brand-purple" class="py-4">Dashboard</a>
    <a routerLink="/transactions" routerLinkActive="text-brand-purple" class="py-4">Transakcje</a>
    <a routerLink="/a" routerLinkActive="text-brand-purple" class="py-4">Analiza</a>
    <a routerLink="/b" routerLinkActive="text-brand-purple" class="py-4">Majątek</a>
    <a routerLink="/c" routerLinkActive="text-brand-purple" class="py-4">Ustawienia</a>
  </div>

  <!-- PRAWO AKCJE  -->
  <div class="flex gap-4">
    <span class="px-4 py-2 rounded-xl">{{ currentMonth }}</span>
    <button
      (click)="modalService.open()"
      class="bg-brand-purple text-zinc-200 px-4 py-2 rounded-xl font-medium"
    >
      + Dodaj transakcje
    </button>
    <div class="relative">
      <!-- AVATAR -->
      <button
        type="button"
        (click)="toggleUserMenu()"
        class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-purple to-violet-600 flex items-center justify-center text-white font-bold"
      >
        {{ userInitials }}
      </button>

      <!-- DROPDOWN -->
      @if (isUserMenuOpen) {
        <div
          class="absolute right-0 mt-3 w-48 rounded-2xl border border-zinc-700 bg-surface-card p-2 shadow-xl z-50"
        >
          <button
            type="button"
            class="w-full text-left px-4 py-2 rounded-xl text-sm text-zinc-300 hover:bg-surface-elevated hover:text-white"
          >
            Profil
          </button>

          <button
            type="button"
            class="w-full text-left px-4 py-2 rounded-xl text-sm text-zinc-300 hover:bg-surface-elevated hover:text-white"
          >
            Ustawienia
          </button>

          <div class="my-2 border-t border-zinc-700"></div>

          <button
            type="button"
            (click)="onLogout()"
            class="w-full text-left px-4 py-2 rounded-xl text-sm text-money-red hover:bg-surface-elevated"
          >
            Wyloguj
          </button>
        </div>
      }
    </div>
  </div>
</nav>
